version: "3.9"

services:
  # ── ML Backend (Port 8000) ────────────────────────────────────────────────
  ml-backend:
    build:
      context: .
      dockerfile: Dockerfile.ml
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── DL Backend (Port 8001) ────────────────────────────────────────────────
  dl-backend:
    build:
      context: .
      dockerfile: Dockerfile.dl
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
      - TRANSFORMERS_CACHE=/app/.cache/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

